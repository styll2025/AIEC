<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display: flex; align-items: center; justify-content: space-between; padding: 26px 56px; position: relative; z-index: 2; font-family: 'IBM Plex Sans', sans-serif; border-bottom: 1px solid {{ borderColor }};">
  <a href="index.html" style="display: flex; align-items: center; gap: 10px;">
    <img src="{{ logoSrc }}" alt="AI Ethics Consortium" style="height: 34px;" />
  </a>
  <div style="display: flex; gap: 40px; align-items: center;">
    <a href="index.html" style="color: {{ textColor }}; font-size: 14px; font-weight: {{ homeWeight }}; letter-spacing: 0.3px;">Home</a>
    <a href="FindExperts.dc.html" style="color: {{ textColor }}; font-size: 14px; font-weight: {{ findWeight }}; letter-spacing: 0.3px;">Find Experts</a>
    <a href="JoinAIEC.dc.html" style="color: {{ textColor }}; font-size: 14px; font-weight: {{ joinWeight }}; letter-spacing: 0.3px;">Join AIEC</a>
    <a href="Contact.dc.html" style="color: {{ textColor }}; font-size: 14px; font-weight: {{ contactWeight }}; letter-spacing: 0.3px;">Contact</a>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:90},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;find&quot;,&quot;join&quot;,&quot;contact&quot;]},&quot;dark&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || '';
    const dark = this.props.dark !== false; // default: dark bg (ink), nav text light
    const w = (name) => (active === name ? 700 : 500);
    return {
      homeWeight: w('home'), findWeight: w('find'), joinWeight: w('join'), contactWeight: w('contact'),
      textColor: dark ? '#f4f2ea' : '#14182c',
      logoSrc: dark ? 'assets/logo_dark_bg.png' : 'assets/logo_light_bg.png',
      borderColor: dark ? 'rgba(244,242,234,0.14)' : 'rgba(20,24,44,0.1)',
    };
  }
}

</script>
</body>
</html>
