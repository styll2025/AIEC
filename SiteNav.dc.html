<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/support.js"></script>
</head>
<body>
<x-dc>
<div style="display: flex; align-items: center; justify-content: space-between; padding: 22px clamp(20px, 5vw, 56px); position: relative; z-index: 20; font-family: 'IBM Plex Sans', sans-serif; border-bottom: 1px solid {{ borderColor }};">
  <a href="/" style="display: flex; align-items: center; gap: 10px; flex: none;">
    <img src="{{ logoSrc }}" alt="AI Ethics Consortium" style="height: 37px;" />
  </a>
  <div class="aiec-nav-desktop" style="display: flex; gap: 40px; align-items: center;">
    <a href="/" style="color: {{ textColor }}; font-size: 14px; font-weight: {{ homeWeight }}; letter-spacing: 0.3px;">Home</a>
    <a href="/find-experts" style="color: {{ textColor }}; font-size: 14px; font-weight: {{ findWeight }}; letter-spacing: 0.3px;">Find Experts</a>
    <a href="/join-aiec" style="color: {{ textColor }}; font-size: 14px; font-weight: {{ joinWeight }}; letter-spacing: 0.3px;">Join AIEC</a>
    <a href="/contact" style="color: {{ textColor }}; font-size: 14px; font-weight: {{ contactWeight }}; letter-spacing: 0.3px;">Contact</a>
  </div>
  <button type="button" class="aiec-nav-toggle" onclick="{{ toggleMenu }}" aria-label="Toggle menu" style="display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 8px; width: 44px; height: 44px; align-items: center; justify-content: center;">
    <span style="width: 22px; height: 2px; background: {{ textColor }}; display: block; transition: transform 0.2s ease;"></span>
    <span style="width: 22px; height: 2px; background: {{ textColor }}; display: block; transition: opacity 0.2s ease;"></span>
    <span style="width: 22px; height: 2px; background: {{ textColor }}; display: block; transition: transform 0.2s ease;"></span>
  </button>
</div>
<sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
  <div style="display: flex; flex-direction: column; gap: 4px; padding: 8px clamp(20px, 5vw, 56px) 20px; background: {{ menuBg }}; position: relative; z-index: 19; border-bottom: 1px solid {{ borderColor }};">
    <a href="/" style="color: {{ textColor }}; font-size: 16px; font-weight: {{ homeWeight }}; padding: 12px 0;">Home</a>
    <a href="/find-experts" style="color: {{ textColor }}; font-size: 16px; font-weight: {{ findWeight }}; padding: 12px 0;">Find Experts</a>
    <a href="/join-aiec" style="color: {{ textColor }}; font-size: 16px; font-weight: {{ joinWeight }}; padding: 12px 0;">Join AIEC</a>
    <a href="/contact" style="color: {{ textColor }}; font-size: 16px; font-weight: {{ contactWeight }}; padding: 12px 0;">Contact</a>
  </div>
</sc-if>
<helmet>
  <style>
    @media (max-width: 860px) {
      .aiec-nav-desktop { display: none !important; }
      .aiec-nav-toggle { display: flex !important; }
    }
  </style>
</helmet>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:90},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;find&quot;,&quot;join&quot;,&quot;contact&quot;]},&quot;dark&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  state = { menuOpen: false };
  renderVals() {
    const active = this.props.active || '';
    const dark = this.props.dark !== false;
    const w = (name) => (active === name ? 700 : 500);
    return {
      homeWeight: w('home'), findWeight: w('find'), joinWeight: w('join'), contactWeight: w('contact'),
      textColor: dark ? '#f4f2ea' : '#14182c',
      logoSrc: dark ? '/assets/logo_dark_bg.png' : '/assets/logo_light_bg.png',
      borderColor: dark ? 'rgba(244,242,234,0.14)' : 'rgba(20,24,44,0.1)',
      menuBg: dark ? '#14182c' : '#ffffff',
      menuOpen: this.state.menuOpen,
      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),
    };
  }
}

</script>
</body>
</html>
