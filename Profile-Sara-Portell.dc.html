<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<dc-import name="ProfilePage"
  person-name="{{ data.name }}"
  title="{{ data.title }}"
  credentials="{{ data.credentials }}"
  based="{{ data.based }}"
  company="{{ data.company }}"
  geo-coverage="{{ data.geoCoverage }}"
  extra-label="{{ data.extraLabel }}"
  extra-value="{{ data.extraValue }}"
  photo="{{ data.photo }}"
  bg-paragraphs="{{ data.bgParagraphs }}"
  support-heading="{{ data.supportHeading }}"
  support-blocks="{{ data.supportBlocks }}"
  industries-label="{{ data.industriesLabel }}"
  industries="{{ data.industries }}"
  consultation="{{ data.consultation }}"
  email="{{ data.email }}"
  hint-size="100%,100%">
</dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      data: {
        name: 'Sara Portell',
        title: 'AIEC Co-founder | Behavioural Scientist | AI Governance Expert',
        credentials: 'CAIE, ISO/IEC 42001 AIMS Certified Auditor',
        based: 'EU',
        company: 'HCRAI',
        geoCoverage: 'UK/ EU, International',
        extraLabel: 'Website',
        extraValue: 'hcrai.com',
        photo: 'assets/head_sara.png',
        consultation: false,
        email: 'saraportell@hcrai.com',
        bgParagraphs: [
          "Sara is an applied behavioural scientist specialising in AI governance, ethics and human-centred AI. She has over 17 years of experience working across behavioural research, product, innovation, UX and AI in global technology organisations, including Shopify, Expedia, F-Secure, Unit4, and start-ups in Health, Wellbeing, Education, Travel, Research and HRTech.",
          "Her work combines academic rigour with real-world practice. She holds an MSc in Strategy and Management of International Business (ESSEC), an MSc in Behavioural Science (LSE), and is completing doctoral research in Psychology at Universidade Católica Portuguesa where her research explores the intersection of AI, human behaviour and wellbeing.",
          "Sara is an Oxford-certified AI ethicist and an ISO/IEC 42001 AI Management Systems auditor. She's also the Founder at HCRAI (Human-Centric Responsible AI). Through HCRAI, she supports organisations in understanding how people interact with AI systems in real-world settings, and supports the design and governance of AI that is safe, trustworthy and human-centred.",
        ],
        supportHeading: "How Sara's Work Supports Organisations",
        supportBlocks: [
          { body: 'Sara helps organisations identify and mitigate the behavioural risks that emerge when AI systems meet real users. Drawing on behavioural science, AI ethics and regulation, she uncovers where and why things go wrong in practice, and translates those findings into design and governance strategies that address them.' },
          { body: 'She works with organisation leaders and product teams to develop responsible practices, and define interaction patterns, safeguards and governance mechanisms that prevent harmful or unintended use, and build trust at the right level.' },
        ],
        industriesLabel: 'Industries She Focuses On',
        industries: 'EdTech | Enterprise SaaS (HR, Talent Management, Financial Management) | eCommerce/ Marketplaces | HealthTech/ Mental Health | FemTech | Travel & Tourism | Technology | Media & Entertainment | Consulting/ Professional Services | Research',
      },
    };
  }
}

</script>
</body>
</html>
